services:

  airflow:
    build: .
    container_name: airflow

    env_file:
      - .env

    ports:
      - "8080:8080"

    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./src:/opt/airflow/src
      - ./config:/opt/airflow/config
      - ./data:/opt/airflow/data

    command: >
      bash -c "
      airflow db migrate &&
      airflow standalone
      "